# Available runners configured by board.cmake.
runners:
- linkserver
- jlink
- pyocd

# Default flash runner if --runner is not given.
flash-runner: linkserver

# Default debug runner if --runner is not given.
debug-runner: linkserver

# Common runner configuration values.
config:
  board_dir: /Users/tedd/dev/Zephyr/zephyr/zephyr/boards/nxp/frdm_mcxa153
  # Build outputs:
  elf_file: zephyr.elf
  bin_file: zephyr.bin
  # Host tools:
  gdb: /Users/tedd/zephyr-sdk-0.17.4/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb
  openocd: /opt/homebrew/bin/openocd
  openocd_search:
    - /Users/tedd/zephyr-sdk-0.17.4/sysroots/arm64-pokysdk-linux/usr/share/openocd/scripts

# Runner specific arguments
args:
  linkserver:
    - --dt-flash=y
    - --device=MCXA153:FRDM-MCXA153
  jlink:
    - --dt-flash=y
    - --device=MCXA153
  pyocd:
    - --dt-flash=y
    - --target=mcxA153
